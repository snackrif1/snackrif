<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snack Rif Menu</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #0d0d0d 0%, #1a0000 100%);
    color: white;
}

/* HEADER /
.header {
    text-align: center;
    padding: 15px 0;
}

.logo {
    width: 85px; / صغرنا اللوغو /
}

h1 {
    margin: 5px 0;
    font-size: 22px;
}

/ CONTAINER /
.container {
    max-width: 420px;
    margin: auto;
    text-align: center;
}

/ MENU IMAGES /
.menu-img {
    width: 100%;
    max-width: 360px;
    margin: 15px auto;
    border-radius: 12px;
    display: block;
}

/ BUTTON /
.btn {
    display: inline-block;
    margin: 20px 0;
    padding: 10px 22px;
    background: red;
    color: white;
    text-decoration: none;
    border-radius: 25px;
    font-size: 14px;
}

/ PC */
@media (min-width: 768px) {
    .container {
        max-width: 380px;
    }

    .menu-img {
        max-width: 330px;
    }
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="logo.png" class="logo">
    <h1>📋 MENU</h1>
</div>

<!-- MENU -->
<div class="container">

    <img src="menu1.jpg" class="menu-img">
    <img src="menu2.jpg" class="menu-img">
    <img src="menu3.jpg" class="menu-img">
    <img src="menu4.jpg" class="menu-img">
    <img src="menu5.jpg" class="menu-img">
    <img src="menu6.jpg" class="menu-img">

    <a href="index.html" class="btn">🏠 Retour Accueil</a>

</div>

</body>
</html>
