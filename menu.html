<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snack Rif Menu</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #0d0d0d 0%, #1a0000 100%);
    color: white;
}

/* CONTAINER (الحل الرئيسي) /
.container {
    max-width: 500px;
    margin: auto;
    text-align: center;
}

/ LOGO /
.logo {
    margin-top: 20px;
}

.logo img {
    width: 110px;
}

/ TITLE /
h1 {
    margin: 10px 0;
    font-size: 26px;
    letter-spacing: 2px;
}

/ MENU IMAGES /
.menu-img {
    width: 100%;
    margin: 20px 0;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(255,0,0,0.25);
    transition: transform 0.3s ease;
}

.menu-img:hover {
    transform: scale(1.02);
}

/ BUTTON /
.btn {
    display: inline-block;
    margin: 25px 0;
    padding: 12px 25px;
    background: linear-gradient(45deg, red, #ff4d4d);
    color: white;
    text-decoration: none;
    border-radius: 30px;
    font-size: 15px;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/ PC FIX /
@media (min-width: 768px) {
    .container {
        max-width: 420px; / هذا هو السر */
    }
}
</style>

</head>

<body>

<div class="container">

    <div class="logo">
        <img src="logo.png" alt="Snack Rif">
    </div>

    <h1>📋 MENU</h1>

    <img src="menu1.jpg" class="menu-img">
    <img src="menu2.jpg" class="menu-img">
    <img src="menu3.jpg" class="menu-img">
    <img src="menu4.jpg" class="menu-img">
    <img src="menu5.jpg" class="menu-img">
    <img src="menu6.jpg" class="menu-img">

    <a href="index.html" class="btn">🏠 Retour Accueil</a>

</div>

</body>
</html>
